name: release
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    if: github.repository != 'calvindotsg/template-python-cli'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json

      - name: Checkout release PR branch
        if: ${{ steps.release.outputs.pr && !steps.release.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: release-please--branches--main

      - name: Setup uv
        if: ${{ steps.release.outputs.pr && !steps.release.outputs.release_created }}
        uses: astral-sh/setup-uv@v7

      - name: Update uv.lock in release PR
        if: ${{ steps.release.outputs.pr && !steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock already up to date"
          else
            BOT_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
            git config user.name "${APP_SLUG}[bot]"
            git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: update uv.lock"
            git push
          fi

  bump-tap:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
          repositories: homebrew-tap
      - name: Dispatch formula update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: calvindotsg/homebrew-tap
          event-type: formula-update
          client-payload: |-
            {
              "formula": "template-python-cli",
              "version": "${{ needs.release-please.outputs.tag_name }}",
              "url": "https://github.com/calvindotsg/template-python-cli/archive/refs/tags/${{ needs.release-please.outputs.tag_name }}.tar.gz",
              "type": "python"
            }

  pypi-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
